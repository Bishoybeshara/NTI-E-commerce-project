<div class="py-3">
  <h4 class="mb-4">{{ isEditing ? 'Edit Product' : 'Add Product' }}</h4>

  @if(errorMsg) {
    <div class="alert alert-danger">{{ errorMsg }}</div>
  }
  @if(successMsg) {
    <div class="alert alert-success">{{ successMsg }}</div>
  }

  <div class="row">

    <!-- Form -->
    <div class="col-md-5">
      <div class="card p-3 mb-4">
        <form [formGroup]="productForm" (ngSubmit)="onSubmit()">

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="name">
          </div>

          <div class="mb-3">
            <label class="form-label">Slug</label>
            <input type="text" class="form-control" formControlName="slug">
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" formControlName="description" rows="3"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" class="form-control" formControlName="price">
          </div>

          <div class="mb-3">
            <label class="form-label">Price After Discount <span class="text-muted">(optional)</span></label>
            <input type="number" class="form-control" formControlName="priceAfterDiscount">
          </div>

          <div class="mb-3">
            <label class="form-label">Stock Quantity</label>
            <input type="number" class="form-control" formControlName="stock_quantity">
          </div>

          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" formControlName="category" (change)="onCategoryChange($event)">
              <option value="">Select Category</option>
              @for(cat of categories; track cat._id) {
                <option [value]="cat._id">{{ cat.name }}</option>
              }
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Subcategory</label>
            <select class="form-select" formControlName="subcategory">
              <option value="">Select Subcategory</option>
              @for(sub of subcategories; track sub._id) {
                <option [value]="sub._id">{{ sub.name }}</option>
              }
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Image</label>
            <input type="file" class="form-control" accept="image/*" (change)="onFileChange($event)">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark"
              [disabled]="productForm.invalid">
              {{ isEditing ? 'Update' : 'Add' }}
            </button>
            @if(isEditing) {
              <button type="button" class="btn btn-outline-secondary" (click)="resetForm()">Cancel</button>
            }
          </div>

        </form>
      </div>
    </div>

    <!-- Products List -->
    <div class="col-md-7">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            @for(product of products; track product._id) {
              <tr>
                <td>
                  <img [src]="staticURL + product.image_url"
                    width="50" height="50" style="object-fit:cover" class="rounded">
                </td>
                <td>{{ product.name }}</td>
                <td>{{ product.price }} EGP</td>
                <td>{{ product.stock_quantity }}</td>
                <td>
                  <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-primary"
                      (click)="editProduct(product)">Edit</button>
                    <button class="btn btn-sm btn-outline-danger"
                      (click)="deleteProduct(product._id)">Delete</button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
